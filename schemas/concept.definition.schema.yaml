$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://knotebooks.local/schemas/concept.definition.schema.yaml"
title: "knotebooks concept.definition atom"
description: "Canonical schema for concept.definition atoms."
allOf:
  - $ref: "atom.schema.yaml"
type: object
required:
  - unit_id
  - family
  - type
  - name
  - body
  - based_on
  - axiomatic
  - aliases
properties:
  unit_id:
    type: string
    pattern: "^def:[A-Za-z0-9][A-Za-z0-9._-]*$"
  family:
    const: concept
  type:
    const: definition
  name:
    type: string
    minLength: 1
    pattern: "^(?!.*\\bover\\b).+$"
    description: "Canonical concept name. Keep it parameter-free and do not include local assumptions such as 'over k'."
  body:
    type: string
    minLength: 1
    description: "Single LaTeX-preserving definition text field."
  based_on:
    type: array
    items:
      type: string
      pattern: "^def:[A-Za-z0-9][A-Za-z0-9._-]*$"
    uniqueItems: true
  axiomatic:
    type: boolean
  aliases:
    $ref: "atom.schema.yaml#/$defs/string_list"
additionalProperties: false
x-knotebooks-semantic-rules:
  - "based_on must not contain unit_id itself."
  - "based_on: [] with axiomatic: false means dependency analysis is unresolved."
  - "aliases must be true synonyms, not stricter variants or local special cases."
  - "body must contain the definition text, not proof, evidence, or failed-process material."
  - "concept.definition cannot include notation, context, or cross-family relation fields."
