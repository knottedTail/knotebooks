$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://knotebooks.local/schemas/process.reference_note.schema.yaml"
title: "knotebooks process.reference_note atom"
description: "Canonical schema for process.reference_note atoms."
allOf:
  - $ref: "process.schema.yaml"
  - type: object
    properties:
      type:
        const: reference_note
    required:
      - type
    x-knotebooks-semantic-rules:
      - "A reference_note should record literature-derived material without turning it into a final canonical claim by itself."
      - "A reference_note may summarize one literature block while producing canonical def: and stmt: atoms extracted from that block."
      - "A reference_note is the preferred v1 place for literature provenance that concept.definition does not store directly."
