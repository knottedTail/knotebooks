$schema: "https://knotebooks.local/schemas/concept.definition.schema.yaml"
atom_id: def:associative-algebra
family: concept
type: definition
name: associative algebra
body: |
  An associative algebra over a field $F$ is a vector space $A$ over $F$
  equipped with a bilinear multiplication map $A \times A \to A$ that is
  associative.
based_on:
  - def:field
  - def:vector-space
axiomatic: false
aliases: []
