atom_id: def:uqg
family: concept
type: definition
name: U_q(\mathfrak{g})
body: |
  $U_q(\mathfrak{g})$ is an algebra generated by
  $\{q_i^{\pm H_i/2}, X_{\pm i}\}$, where $q_i = q^{d_i}$ and $q = e^{t/2}$,
  subject to the relations $[H_i, H_j] = 0$,
  $[H_i, X_{\pm j}] = \pm a_{ij} X_{\pm j}$,
  $[X_{+i}, X_{-j}] = \delta_{ij} \frac{q_i^{H_i} - q_i^{-H_i}}{q_i - q_i^{-1}}$,
  and the $q$-Serre relations
  $\sum_{k=0}^{1-a_{ij}} \begin{bmatrix} 1 - a_{ij} \\ k\end{bmatrix}_{q_i}
  X_{\pm i}^{1-a_{ij}-k} X_{\pm j} X_{\pm i}^k = 0$ for $i \neq j$, with Hopf
  algebra structure
  $\Delta H_i = H_i \otimes 1 + 1 \otimes H_i$,
  $\Delta X_{\pm i} = X_{\pm i} \otimes q_i^{H_i / 2} + q_i^{-H_i / 2} \otimes X_{\pm i}$,
  $\epsilon(H_i) = \epsilon(X_{\pm i}) = 0$, $S(H_i) = -H_i$, and
  $S(X_{\pm i}) = -q_i^{\pm 1} X_{\pm i}$.
based_on:
  - def:associative-algebra
axiomatic: false
aliases: []
