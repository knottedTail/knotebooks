atom_id: def:bsl-q-2
family: concept
type: definition
name: BSL_q(2)
body: |
  $BSL_q(2)$ is the associative algebra generated by $a,b,c,d$ with relations
  $bc = cb + (1-q^{-2})a(d-a)$, $ba = q^{2}ab$, $cd = dc + (1-q^{-2})ca$,
  $ca = q^{-2}ac$, $db = bd + (1-q^{-2})ab$, and $da = ad$, together with the
  quantum determinant condition $\det(u) = ad - q^{-2}cb = 1$.
based_on:
  - def:associative-algebra
axiomatic: false
